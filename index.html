<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinkerTendo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0;
      transition: background 0.4s ease;
    }
    body.light { background: #f7f2ea; }

    .page-wrap {
      position: relative;
      width: 100%;
      max-width: 1440px;
    }

    /* The original design image — this IS the visual */
    .page-bg {
      display: block;
      width: 100%;
      height: auto;
      transition: opacity 0.3s ease;
    }
    .page-bg.hidden { display: none; }

    /* Theme toggle button floating on top */
    .theme-toggle {
      position: absolute;
      top: 3.8%;
      right: 7%;
      z-index: 20;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 14px;
      color: rgba(255,255,255,0.5);
      font-family: 'Space Mono', monospace, monospace;
      font-size: 10px;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }
    .theme-toggle:hover { border-color: #2ee8d5; color: #fff; }
    body.light .theme-toggle {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.15);
      color: rgba(0,0,0,0.4);
    }
    body.light .theme-toggle:hover { border-color: #2ee8d5; color: #000; }

    /* Invisible click grid overlay */
    .click-grid {
      position: absolute;
      /* Grid area within the image — these percentages map to the card grid */
      top: 25.6%;
      left: 1.5%;
      width: 97%;
      height: 41.5%;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 1.1% 1.1%;
      z-index: 10;
    }

    .click-card {
      cursor: pointer;
      border-radius: 8px;
      position: relative;
      transition: transform 0.15s ease;
    }
    .click-card:hover {
      transform: scale(1.03);
    }
    .click-card:active {
      transform: scale(0.97);
    }

    /* Animation flash overlay on click */
    .click-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background: rgba(46, 232, 213, 0);
      transition: background 0.15s ease;
      pointer-events: none;
    }
    .click-card.flash::after {
      animation: cardFlash 0.4s ease;
    }
    @keyframes cardFlash {
      0%   { background: rgba(46, 232, 213, 0.15); }
      100% { background: rgba(46, 232, 213, 0); }
    }

    /* Wiggle animation for joystick, dpad */
    .click-card.wiggle {
      animation: wiggle 0.5s ease;
    }
    @keyframes wiggle {
      0%   { transform: rotate(0); }
      20%  { transform: rotate(4deg); }
      40%  { transform: rotate(-4deg); }
      60%  { transform: rotate(3deg); }
      80%  { transform: rotate(-2deg); }
      100% { transform: rotate(0); }
    }

    /* Spin for logo */
    .click-card.spin {
      animation: spin 0.7s ease;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.05); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Bounce for cartridge, power, buttons */
    .click-card.bounce {
      animation: bounce 0.4s ease;
    }
    @keyframes bounce {
      0%   { transform: translateY(0); }
      30%  { transform: translateY(-8px); }
      60%  { transform: translateY(2px); }
      100% { transform: translateY(0); }
    }

    /* Pulse for power */
    .click-card.pulse {
      animation: pulse 0.5s ease;
    }
    @keyframes pulse {
      0%   { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 214, 35, 0.4); }
      50%  { transform: scale(1.05); box-shadow: 0 0 20px 8px rgba(245, 214, 35, 0.2); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 214, 35, 0); }
    }

    /* Card state overlays — shows region from alternate dark mode images */
    .card-state-overlay {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background-size: cover;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .card-state-overlay.active {
      opacity: 1;
    }

    /* Entry animation */
    .click-card {
      opacity: 0;
      transform: translateY(10px);
      animation: enterCard 0.4s ease forwards;
    }
    .click-card:nth-child(1)  { animation-delay: 0.05s; }
    .click-card:nth-child(2)  { animation-delay: 0.10s; }
    .click-card:nth-child(3)  { animation-delay: 0.15s; }
    .click-card:nth-child(4)  { animation-delay: 0.20s; }
    .click-card:nth-child(5)  { animation-delay: 0.25s; }
    .click-card:nth-child(6)  { animation-delay: 0.30s; }
    .click-card:nth-child(7)  { animation-delay: 0.35s; }
    .click-card:nth-child(8)  { animation-delay: 0.40s; }
    .click-card:nth-child(9)  { animation-delay: 0.45s; }
    .click-card:nth-child(10) { animation-delay: 0.50s; }
    @keyframes enterCard {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      .theme-toggle { font-size: 8px; padding: 3px 10px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-wrap">
    <!-- The original design images — pixel-perfect -->
    <img id="img-dark1" class="page-bg" src="dark%20mode1.png" alt="TinkerTendo">
    <img id="img-dark2" class="page-bg hidden" src="dark%20mode2.png" alt="TinkerTendo">
    <img id="img-dark3" class="page-bg hidden" src="dark%20mode3.png" alt="TinkerTendo">
    <img id="img-light" class="page-bg hidden" src="tinker-light.png" alt="TinkerTendo">

    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">
      <span id="theme-label">light mode</span>
    </button>

    <!-- Invisible click areas over each card -->
    <div class="click-grid">
      <div class="click-card" data-card="0" data-anim="wiggle" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="1" data-anim="spin" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="2" data-anim="flash" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="3" data-anim="flash" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="4" data-anim="bounce" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="5" data-anim="pulse" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="6" data-anim="wiggle" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="7" data-anim="flash" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="8" data-anim="flash" onclick="animateCard(this)"></div>
      <div class="click-card" data-card="9" data-anim="flash" onclick="animateCard(this)"></div>
    </div>
  </div>

  <script>
    let isDark = true;

    // Dark mode state cycling: rotate through 3 dark images
    const darkImages = ['img-dark1', 'img-dark2', 'img-dark3'];
    let darkState = 0;

    function toggleTheme() {
      isDark = !isDark;
      const label = document.getElementById('theme-label');
      document.body.classList.toggle('light', !isDark);

      // Hide all images
      document.querySelectorAll('.page-bg').forEach(img => img.classList.add('hidden'));

      if (isDark) {
        document.getElementById(darkImages[darkState]).classList.remove('hidden');
        label.textContent = 'light mode';
      } else {
        document.getElementById('img-light').classList.remove('hidden');
        label.textContent = 'dark mode';
      }
    }

    function animateCard(el) {
      const anim = el.dataset.anim;

      // Remove any existing animation
      el.classList.remove('wiggle', 'spin', 'bounce', 'pulse', 'flash');
      void el.offsetWidth; // force reflow

      // Apply animation
      el.classList.add(anim);
      setTimeout(() => el.classList.remove(anim), 600);

      // Cycle through dark mode states on click (when in dark mode)
      if (isDark) {
        darkState = (darkState + 1) % 3;
        document.querySelectorAll('.page-bg').forEach(img => img.classList.add('hidden'));
        document.getElementById(darkImages[darkState]).classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
